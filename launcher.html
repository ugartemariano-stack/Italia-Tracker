<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Italia 🇮🇹</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f0ede6;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.card{
  background:#fff;border-radius:28px;padding:30px 28px 26px;
  max-width:300px;width:92%;
  box-shadow:0 4px 40px rgba(0,0,0,0.10);
  text-align:center;animation:up 0.5s ease;
}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.flag{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-bottom:26px}
.flag .g{flex:1;background:#009246}
.flag .w{flex:1;background:#e8e8e8}
.flag .r{flex:1;background:#CE2B37}
.map-btn{
  display:inline-block;cursor:pointer;
  transition:transform 0.22s;margin-bottom:20px;
  filter:drop-shadow(0 5px 16px rgba(0,100,50,0.26));
}
.map-btn:hover{transform:scale(1.07)}
.map-btn:active{transform:scale(0.96)}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:0.1em;color:#bbb;text-transform:uppercase;margin-bottom:5px}
.title{font-size:21px;font-weight:700;color:#1a1a18;line-height:1.2;margin-bottom:7px;letter-spacing:-0.3px}
.desc{font-size:13px;color:#999;line-height:1.5;margin-bottom:24px}
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#009246;color:#fff;font-size:15px;font-weight:600;
  padding:13px 22px;border-radius:50px;text-decoration:none;width:100%;
  box-shadow:0 3px 14px rgba(0,146,70,0.32);transition:all 0.18s;
}
.btn:hover{background:#007a3d;transform:translateY(-1px);box-shadow:0 5px 20px rgba(0,146,70,0.42)}
.btn:active{transform:none}
.hint{margin-top:12px;font-size:11px;color:#ccc}
</style>
</head>
<body>
<div class="card">
  <div class="flag"><div class="g"></div><div class="w"></div><div class="r"></div></div>

  <div class="map-btn" onclick="window.open('https://ugartemariano-stack.github.io/Italia-Tracker/','_blank')">
  <!--
    Coordinates derived from real lat/lon data.
    Scale: x = (lon - 6.5) * 6,  y = (47.5 - lat) * 11
    Going clockwise from NW corner (Ventimiglia).

    Key landmarks:
      NW  Ventimiglia  43.8N  7.5E  → ( 6, 41)
      N   Trieste      45.7N 13.8E  → (44, 20)  ← NE corner
      E   Bari         41.1N 16.9E  → (62, 70)  ← Adriatic
      E   OTRANTO      40.0N 18.5E  → (72, 83)  ← HEEL EXTREME (rightmost)
          Taranto      40.5N 17.2E  → (64, 77)  ← Gulf of Taranto apex
          Crotone      39.0N 17.0E  → (63, 94)  ← Calabria
      S   REGGIO       38.0N 15.7E  → (55,105)  ← TOE (bottommost)
      W   Napoli       40.8N 14.0E  → (45, 74)  ← Tyrrhenian
      W   Roma         41.7N 12.3E  → (35, 64)
      W   Genova       44.4N  8.9E  → (14, 34)  ← dips south!
  -->
  <svg width="100" height="135"
       viewBox="3 15 73 95"
       xmlns="http://www.w3.org/2000/svg">

    <!-- ── SARDEGNA ── -->
    <ellipse cx="13" cy="78" rx="5" ry="13" fill="#009246"/>

    <!-- ── SICILIA ── rough triangle -->
    <polygon fill="#009246"
      points="54,100 35,106 38,114 53,111"/>

    <!-- ── PENINSULA (bota de Italia) ──
         36 points going clockwise.
         Heel protrudes RIGHT to x=72.
         Gulf of Taranto notch at points 13-16.
         Toe at bottom x=55,y=105.
         Tyrrhenian west coast goes back up left side.
    -->
    <polygon fill="#009246"
      points="
        6,41
        7,28
        15,22
        35,22
        44,20
        42,43
        46,55
        54,66
        62,70
        69,76
        72,83
        71,85
        69,83
        64,77
        61,80
        59,86
        63,94
        64,95
        55,105
        55,102
        56,100
        58,95
        56,95
        58,89
        56,85
        55,81
        49,75
        45,74
        43,69
        37,66
        32,59
        23,44
        20,37
        14,34
        9,40
        6,41
      "/>

    <!-- Pin — Roma -->
    <circle cx="35" cy="62" r="3.5" fill="#CE2B37"/>
    <circle cx="35" cy="62" r="1.6" fill="#fff"/>

  </svg>
  </div>

  <div class="eyebrow">PoliMi · PoliTo · 2027</div>
  <div class="title">Postulación<br>Arquitectura Italia</div>
  <div class="desc">Seguimiento de actividades<br>para la admisión universitaria</div>

  <a class="btn" href="https://ugartemariano-stack.github.io/Italia-Tracker/" target="_blank">
    Entrar al tracker &nbsp;→
  </a>
  <div class="hint">Toca el mapa o el botón para abrir</div>
</div>
</body>
</html>
